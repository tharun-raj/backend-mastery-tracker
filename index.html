const START_LABEL=START.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});

function rank(xp){return[...RANKS].reverse().find(r=>xp>=r.m)||RANKS[0];}
function nextRank(xp){return RANKS.find(r=>xp<r.m)||null;}
function today(){return new Date().toDateString();}
function dayNum(){const n=new Date();n.setHours(0,0,0,0);return Math.max(1,Math.floor((n-START)/864e5)+1);}
function weekNum(){return Math.min(36,Math.ceil(dayNum()/7));}
function beforeStart(){return new Date()<START;}

// ── STATE ─────────────────────────────────────────────────────────────────────
let S={checked:{},streak:0,lastActive:"",goal:100,dayXP:{}};
let syncStatus="loading"; // loading | synced | offline | error

async function loadData(){
  // Try window.storage (Claude artifact cloud storage) first
  try{
    if(window.storage){
      const r=await window.storage.get(KEY);
      if(r&&r.value){S=JSON.parse(r.value);syncStatus="synced";return;}
    }
  }catch(e){}
  // Fallback: localStorage
  try{const r=localStorage.getItem(KEY);if(r)S=JSON.parse(r);}catch{}
  syncStatus=window.storage?"error":"offline";
}

async function persist(){
  // Always write localStorage immediately (instant, no await)
  try{localStorage.setItem(KEY,JSON.stringify(S));}catch{}
  // Then sync to cloud
  if(!window.storage){syncStatus="offline";badge();return;}
  try{
    syncStatus="syncing";badge();
    await window.storage.set(KEY,JSON.stringify(S));
    syncStatus="synced";
  }catch(e){syncStatus="error";}
  badge();
}

function badge(){
  const el=document.getElementById("sb");
  if(!el)return;
  const m={loading:["#555","loading..."],syncing:["#FF8C00","syncing…"],synced:["#00FF88","✓ synced"],offline:["#888","local only"],error:["#FF4444","sync error"]};
  const[c,t]=m[syncStatus]||m.offline;
  el.style.color=c;el.textContent=t;
}

function xpTotal(){return ALL.reduce((s,t)=>S.checked[t.id]?s+t.xp:s,0);}
function xpToday(){return S.dayXP[today()]||0;}

function ring(pct,color,sz,sw,inner=""){
  const r=sz/2-sw-2,c=2*Math.PI*r;
  return`<div class="rw" style="width:${sz}px;height:${sz}px">
    <svg width="${sz}" height="${sz}" style="transform:rotate(-90deg)">
      <circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="#1a2a40" stroke-width="${sw}"/>
      <circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${sw}"
        stroke-dasharray="${c}" stroke-dashoffset="${c*(1-Math.min(pct,100)/100)}" stroke-linecap="round"
        style="transition:stroke-dashoffset .6s ease"/>
    </svg>${inner?`<div class="ri">${inner}</div>`:""}</div>`;
}

function floatXP(xp,color,x,y){
  const el=document.createElement("div");
  el.className="fxp";el.style.cssText=`left:${x}px;top:${y}px;color:${color};text-shadow:0 0 12px ${color}`;
  el.textContent=`+${xp}`;document.body.appendChild(el);
  let t0=null;
  (function a(ts){
    if(!t0)t0=ts;const t=(ts-t0)/1000;
    if(t>1.1){el.remove();return;}
    el.style.top=`${y-t*65}px`;el.style.opacity=1-t/1.1;
    requestAnimationFrame(a);
  })(performance.now());
}

function celebrate(r){
  const d=document.createElement("div");d.className="cel";
  d.innerHTML=`<div style="text-align:center;padding:52px 72px;border:2px solid ${r.c};box-shadow:0 0 80px ${r.c};background:#07101a;border-radius:4px">

    <div style="font-size:9px;letter-spacing:6px;color:#666;margin-bottom:8px">RANK UNLOCKED</div>

// ── TOGGLE ────────────────────────────────────────────────────────────────────
async function toggle(id,e){
  const task=ALL.find(t=>t.id===id);if(!task)return;
  const rect=e.currentTarget.getBoundingClientRect();
  const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
  const was=!!S.checked[id], prevR=rank(xpTotal());
  const tk=today();
  if(was){delete S.checked[id];S.dayXP[tk]=Math.max(0,(S.dayXP[tk]||0)-task.xp);}
  else{S.checked[id]=true;S.dayXP[tk]=(S.dayXP[tk]||0)+task.xp;
    floatXP(task.xp,TC[task.type].c,cx,cy);
    const nr=rank(xpTotal());
    if(nr.t!==prevR.t)setTimeout(()=>celebrate(nr),400);
  }
  await persist();render();
}

  const gpHtml=GP?`<div style="position:absolute;top:100%;left:50%;transform:translateX(-50%);background:#0d1828;border:1px solid #1a3060;border-radius:4px;padding:10px;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,.8);margin-top:4px;min-width:175px">
    ${GOALS.map(g=>`<div onclick="setGoal(${g.x})" style="padding:7px 10px;cursor:pointer;color:${S.goal===g.x?g.x===50?"#00D4FF":g.x===100?"#00FF88":"#FF8C00":"#666"};border-left:${S.goal===g.x?"2px solid currentColor":"2px solid transparent"};margin-bottom:2px">
      <span style="font-weight:900;font-size:11px">${g.l}</span><span style="font-size:9px;color:#555;margin-left:6px">${g.d} · ${g.x} XP</span>
    </div>`).join("")}
  </div>`:"";

  document.getElementById("app").innerHTML=`
    <!-- HUD -->
    <div style="display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;align-items:stretch">

      <!-- Rank -->
      <div class="card" style="flex:1 1 185px;border-color:${r.c}35;box-shadow:0 0 20px ${r.c}15">
        <div style="font-size:8px;letter-spacing:4px;color:#555;margin-bottom:5px">RANK</div>
        <div style="display:flex;align-items:center;gap:9px">
          <span style="font-size:26px">${r.i}</span>
          <div>
            <div style="font-size:13px;font-weight:900;color:${r.c}">${r.t}</div>
            <div style="font-size:19px;font-weight:900">${xp.toLocaleString()}<span style="font-size:9px;color:#555;margin-left:4px">XP</span></div>
          </div>
        </div>
        ${nr?`<div style="margin-top:8px">
          <div style="display:flex;justify-content:space-between;font-size:8px;color:#444;margin-bottom:3px">
            <span>→ ${nr.i} ${nr.t}</span><span>${(nr.m-xp).toLocaleString()} XP</span>
          </div>
          <div style="height:3px;background:#1a2a40;border-radius:2px;overflow:hidden">
            <div class="bar" style="width:${Math.min(100,Math.round(xp/nr.m*100))}%;background:${r.c}"></div>
          </div>
        </div>`:""}
      </div>

      <!-- Daily ring -->
      <div class="card" style="flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:5px;position:relative">
        <div style="font-size:8px;letter-spacing:3px;color:#555">TODAY</div>
        ${ring(dp,gc,70,5,`<div style="text-align:center"><div style="font-size:13px;font-weight:900;color:${gc}">${tx}</div><div style="font-size:7px;color:#444">/${S.goal}</div></div>`)}
        <div style="font-size:8px;color:${dp>=100?"#FFD700":"#555"};letter-spacing:1px">${dp>=100?"🏅 DONE!":"XP TODAY"}</div>
        <button onclick="toggleGP()" style="font-size:7px;letter-spacing:2px;color:#444;background:none;border:1px solid #1a2240;padding:2px 7px;border-radius:2px;cursor:pointer;font-family:inherit">SET GOAL</button>
        ${gpHtml}
      </div>

      <!-- 7-day bars -->
      <div class="card" style="flex:1 1 195px">
        <div style="font-size:8px;letter-spacing:3px;color:#555;margin-bottom:10px">LAST 7 DAYS</div>
        <div style="display:flex;align-items:flex-end;gap:4px;height:62px">
          ${last7.map(d=>{const h=Math.round(d.xp/mx*46),met=d.xp>=S.goal;return`
          <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">
            <div style="font-size:7px;color:${d.xp>0?(met?"#FFD700":"#00FF88"):"#222"};min-height:12px;text-align:center">${d.xp||""}</div>
            <div style="width:100%;height:46px;display:flex;align-items:flex-end">
              <div style="width:100%;height:${Math.max(2,h)}px;background:${d.isToday?(met?"#FFD700":"#00FF88"):d.xp>0?(met?"#8a7000":"#0e5030"):"#0f1828"};border-radius:2px 2px 0 0;transition:height .4s"></div>
            </div>
            <div style="font-size:7px;color:${d.isToday?"#00D4FF":"#3a4a5a"}">${d.day}</div>
          </div>`}).join("")}
        </div>
      </div>

      <!-- Streak -->
      <div class="card" style="flex:0 0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-width:72px;border-color:#2a1800">
        <div style="font-size:28px">🔥</div>
        <div style="font-size:24px;font-weight:900;color:#FF8C00">${S.streak}</div>
        <div style="font-size:8px;letter-spacing:2px;color:#555">DAYS</div>
      </div>

      <!-- Overall -->
      <div class="card" style="flex:0 0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px">
        ${ring(op,r.c,62,5,`<span style="font-size:11px;font-weight:900;color:${r.c}">${op}%</span>`)}
        <div style="font-size:8px;letter-spacing:2px;color:#555">OVERALL</div>
      </div>
    </div>

    <!-- NAV -->
    <div style="display:flex;gap:5px;margin-bottom:18px;border-bottom:1px solid #1a2a40;padding-bottom:12px;flex-wrap:wrap">
      ${[["today","📅 TODAY"],["week","📆 THIS WEEK"],["all","🗂️ ALL PHASES"],["deploy","🌐 DEPLOY"]]
        .map(([v,l])=>`<button class="nav-btn ${VIEW===v?"on":""}" onclick="setView('${v}')">${l}</button>`).join("")}
    </div>

    <!-- CONTENT -->
    <div>${content}</div>

    <!-- FOOTER -->
    <div style="margin-top:24px;padding-top:14px;border-top:1px solid #1a2a40;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        ${Object.entries(TC).map(([k,v])=>`<div style="display:flex;align-items:center;gap:4px;font-size:8px;color:#3a4a5a">
          <div style="width:5px;height:5px;border-radius:50%;background:${v.c}"></div>${v.l}
        </div>`).join("")}
        <span id="sb" style="font-size:8px;letter-spacing:2px;margin-left:6px;color:#555">loading...</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div style="font-size:9px;color:#2a3a40">${Object.keys(S.checked).length}/${ALL.length} tasks · starts ${START_LABEL}</div>
        <button onclick="doReset()" style="background:transparent;border:1px solid #1a1414;color:#2a1616;padding:3px 10px;border-radius:2px;cursor:pointer;font-size:7px;letter-spacing:2px;font-family:inherit">RESET</button>
      </div>
    </div>`;
  badge();
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function setView(v){VIEW=v;GP=false;render();}
function setPhase(id){AP=id;AW=null;VIEW="all";render();}
function setPhaseTab(id){AP=id;AW=null;render();}
function setWeek(id){AW=id;render();}
function toggleGP(){GP=!GP;render();}
async function setGoal(x){S.goal=x;GP=false;await persist();render();}
async function doReset(){if(confirm("Reset ALL progress? Cannot be undone.")){S={checked:{},streak:0,lastActive:"",goal:100,dayXP:{}};await persist();render();}}

// ── BOOT ──────────────────────────────────────────────────────────────────────
(async()=>{
  await loadData();
  // Streak check
  const td=today();
  if(S.lastActive!==td){
    const yest=new Date(Date.now()-864e5).toDateString();
    S.streak=S.lastActive===yest?S.streak+1:S.lastActive?1:S.streak;
    S.lastActive=td;
    await persist();
  }
  render();
})();
</script>
</body>
</html>
